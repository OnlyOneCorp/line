/* ---------- 상태 ---------- */
let lang = localStorage.getItem('oo_md_lang') || ((navigator.language||'').startsWith('en') ? 'en' : 'ko');
let pool=[], idx=0, cur=null, locked=false;
let streak=0, best=+(localStorage.getItem('oo_md_best')||0);
let autoRead = localStorage.getItem('oo_md_auto')==='1';

const $=s=>document.querySelector(s);
const shuffle=a=>{a=a.slice();for(let i=a.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[a[i],a[j]]=[a[j],a[i]];}return a;};

function applyLang(){
 document.documentElement.lang=lang;
 const t=T[lang];
 document.querySelectorAll('[data-t]').forEach(el=>{
   const k=el.getAttribute('data-t');
   if(t[k]!==undefined) el.innerHTML=t[k];
 });
 $('#ko').classList.toggle('on',lang==='ko');
 $('#en').classList.toggle('on',lang==='en');
 $('#best').textContent=best;
 buildPool(); newQuestion();
}
function setLang(l){lang=l;localStorage.setItem('oo_md_lang',l);applyLang();}

function buildPool(){pool=shuffle(DATA[lang]);idx=0;}
function pickDistractors(answer){
 const titles=[...new Set(DATA[lang].map(d=>d.a))].filter(a=>a!==answer);
 return shuffle(titles).slice(0,3);
}

function newQuestion(){
 if(idx>=pool.length){pool=shuffle(DATA[lang]);idx=0;}
 cur=pool[idx++];locked=false;
 $('#quote').textContent=cur.q;
 const tt=cur.t==='영화'||cur.t==='Movie'?T[lang].movie:T[lang].drama;
 $('#qtype').textContent=tt;
 const opts=shuffle([cur.a,...pickDistractors(cur.a)]);
 const box=$('#opts');box.innerHTML='';
 opts.forEach(o=>{
   const b=document.createElement('button');
   b.className='opt';b.innerHTML=`<span>${o}</span><span class="mk">✓</span>`;
   b.onclick=()=>choose(b,o);
   box.appendChild(b);
 });
 $('#hint').textContent='';
 stopSpeak();
 if(autoRead) setTimeout(speakQuote,250);
}

function choose(btn,val){
 if(locked) return; locked=true;
 const correct = val===cur.a;
 const buttons=[...document.querySelectorAll('.opt')];
 buttons.forEach(b=>{
   b.disabled=true;
   const label=b.querySelector('span').textContent;
   if(label===cur.a){b.classList.add('ok');}
 });
 if(correct){
   streak++;
   if(streak>best){best=streak;localStorage.setItem('oo_md_best',best);}
   $('#streak').textContent=streak;$('#best').textContent=best;
   $('#hint').textContent=T[lang].right+' 🎉';
   track('answer_correct',{streak});
   setTimeout(newQuestion,650);
 }else{
   btn.classList.remove('ok');btn.classList.add('no');
   btn.querySelector('.mk').textContent='✕';
   $('#hint').textContent=`${T[lang].wrong} ${cur.a}`;
   track('answer_wrong',{streak});
   streak=0;$('#streak').textContent=0;
   setTimeout(newQuestion,1450);
 }
}

/* ---------- TTS (읽어주기) ---------- */
let speaking=false;
function pickVoice(){
 const want = lang==='ko'?'ko':'en';
 const vs=speechSynthesis.getVoices();
 return vs.find(v=>v.lang.toLowerCase().startsWith(want)) || null;
}
function speakQuote(){
 if(!('speechSynthesis' in window)) return;
 if(speaking){stopSpeak();return;}
 const u=new SpeechSynthesisUtterance(cur.q);
 u.lang = lang==='ko'?'ko-KR':'en-US';
 const v=pickVoice(); if(v) u.voice=v;
 u.rate=lang==='ko'?1.0:0.95;
 u.onend=()=>{speaking=false;$('#speakBtn').classList.remove('active');};
 u.onerror=()=>{speaking=false;$('#speakBtn').classList.remove('active');};
 speechSynthesis.cancel();
 speechSynthesis.speak(u);
 speaking=true;$('#speakBtn').classList.add('active');
}
function stopSpeak(){if('speechSynthesis' in window)speechSynthesis.cancel();speaking=false;$('#speakBtn').classList.remove('active');}
if('speechSynthesis' in window) speechSynthesis.onvoiceschanged=()=>{};

function toggleAuto(){
 autoRead=!autoRead;localStorage.setItem('oo_md_auto',autoRead?'1':'0');
 $('#autoSw').classList.toggle('on',autoRead);
 if(autoRead) speakQuote();
}

/* ---------- 공유 카드 (Canvas) ---------- */
function shareCard(){
 const c=document.createElement('canvas');c.width=1080;c.height=1080;
 const x=c.getContext('2d');
 x.fillStyle='#FAFAF8';x.fillRect(0,0,1080,1080);
 x.fillStyle='#3D4248';
 x.beginPath();x.arc(540,360,90,0,Math.PI*2);x.lineWidth=42;x.strokeStyle='#3D4248';x.stroke();
 x.fillRect(519,450,42,130);
 x.textAlign='center';
 x.font='700 52px Pretendard, sans-serif';
 x.fillText(lang==='ko'?'명대사 맞히기':'Guess the Line',540,700);
 x.font='800 150px Pretendard, sans-serif';
 x.fillText(best,540,860);
 x.font='600 40px Pretendard, sans-serif';x.fillStyle='#5A616A';
 x.fillText(lang==='ko'?'최고 연속 정답':'best streak',540,920);
 x.font='600 34px Pretendard, sans-serif';
 x.fillText('OnlyOne · For a Happy Day',540,1010);
 c.toBlob(async b=>{
   const file=new File([b],'onlyone-streak.png',{type:'image/png'});
   if(navigator.canShare&&navigator.canShare({files:[file]})){
     try{await navigator.share({files:[file],title:'OnlyOne'});return;}catch(e){}
   }
   const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='onlyone-streak.png';a.click();
 });
}

/* ---------- 동의 / GA4 ---------- */
function track(name,params){ if(window.__consent==='granted') gtag('event',name,params||{}); }
function isEEA(){
 try{
   const tz=Intl.DateTimeFormat().resolvedOptions().timeZone||'';
   return tz.startsWith('Europe/')||tz.startsWith('Atlantic/');
 }catch(e){return false;}
}
function setConsent(ok){
 const v=ok?'granted':'denied';window.__consent=v;
 localStorage.setItem('oo_consent',v);
 gtag('consent','update',{
   'analytics_storage':v,'ad_storage':'denied',
   'ad_user_data':'denied','ad_personalization':'denied'
 });
 $('#consent').classList.remove('show');
 document.body.classList.remove('banner-open');
}
function initConsent(){
 const saved=localStorage.getItem('oo_consent');
 if(saved){window.__consent=saved;
   gtag('consent','update',{'analytics_storage':saved,'ad_storage':'denied','ad_user_data':'denied','ad_personalization':'denied'});
   return;}
 // 미선택: EEA는 기본 거부 유지, 배너 노출. 그 외도 동일하게 명시적 동의 요청.
 setTimeout(()=>{$('#consent').classList.add('show');document.body.classList.add('banner-open');},800);
}

/* ---------- 시작 ---------- */
$('#autoSw').classList.toggle('on',autoRead);
applyLang();
initConsent();
</script>
